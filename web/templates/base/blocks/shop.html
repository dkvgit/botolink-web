{% if categories.shop %}
<section class="category-section">
    <h2 class="category-title">Магазин</h2>
    <div class="links-list">
        {% for link in categories.shop %}
        <a href="{{ link.url }}" class="link-item track-link" data-link-id="{{ link.id }}" target="_blank">
            {% include 'icon_block.html' %}
            <span class="link-title">{{ link.title }}</span>
            <i class="fas fa-shopping-bag"></i>
        </a>
        {% endfor %}
    </div>
</section>
{% endif %}
