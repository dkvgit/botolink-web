<!-- УНИВЕРСАЛЬНАЯ МОДАЛКА - работает для любого ID -->
<div id="universal-modal" class="modal-overlay"
     style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:99999; align-items:center; justify-content:center;">
    <div class="modal-content"
         style="background:#fff; padding:20px; border-radius:12px; width:90%; max-width:350px; position:relative; color:#000;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h3 style="margin:0; font-size:18px;" id="universal-modal-title">Информация</h3>
            <span onclick="closeUniversalModal()" style="cursor:pointer; font-size:28px; color:#999;">&times;</span>
        </div>
        <div id="universal-modal-content"
             style="background:#f5f5f5; padding:15px; border-radius:8px; margin-bottom:15px;">
            Содержимое модалки
        </div>
        <button onclick="copyUniversalText()"
                style="width:100%; background:#0070ba; color:#fff; border:none; padding:12px; border-radius:8px; cursor:pointer; margin-bottom:8px;">
            Копировать
        </button>
        <button onclick="closeUniversalModal()"
                style="width:100%; background:#eee; color:#333; border:none; padding:10px; border-radius:8px; cursor:pointer;">
            Закрыть
        </button>
    </div>
</div>

<script>
    // Функции для универсальной модалки
    function openUniversalModal(id, title, text) {
        document.getElementById('universal-modal-title').textContent = title || 'Информация для ID ' + id;
        document.getElementById('universal-modal-content').textContent = text || 'Данные для ID ' + id;
        document.getElementById('universal-modal').style.display = 'flex';
    }

    function closeUniversalModal() {
        document.getElementById('universal-modal').style.display = 'none';
    }

    function copyUniversalText() {
        const text = document.getElementById('universal-modal-content').textContent;
        copyText(text);
    }
</script>
